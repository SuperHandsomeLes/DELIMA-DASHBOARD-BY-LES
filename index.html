<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Delima SK Merbau</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; text-align: left; font-size: 14px; }
        .item { background: #e8f0fe; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #1a73e8; }
    </style>
</head>
<body>

<div class="box">
    <h2>SK MERBAU</h2>
    <p>Carian ID Delima</p>
    <input type="text" id="nama" placeholder="Taip Nama Murid...">
    <button onclick="cari()">CARI</button>
    <div id="result"></div>
</div>

<script>
    const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQIDL_97U8seCG9Ibuz-tfkjpouZe3V_q2Uh-NbvdhEIctFj35L6-LN55TuRw_3IQ/pub?output=csv";

    async function cari() {
        const input = document.getElementById('nama').value.toUpperCase();
        const resDiv = document.getElementById('result');
        if(input.length < 3) { alert("Taip sekurang-kurangnya 3 huruf"); return; }
        
        resDiv.innerHTML = "Sedang mencari...";

        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const baris = data.split("\n");
            resDiv.innerHTML = "";
            
            let jumpa = false;
            for(let i = 1; i < baris.length; i++) {
                const kolom = baris[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(kolom[1] && kolom[1].toUpperCase().includes(input)) {
                    resDiv.innerHTML += `<div class="item">
                        <b>Nama:</b> ${kolom[1]}<br>
                        <b>Kelas:</b> ${kolom[2]} ${kolom[3]}<br>
                        <b>ID:</b> <span style="color:red">${kolom[4]}</span>
                    </div>`;
                    jumpa = true;
                }
            }
            if(!jumpa) resDiv.innerHTML = "Nama tidak dijumpai.";
        } catch (e) {
            resDiv.innerHTML = "Ralat: Sila cuba di GitHub atau pastikan internet stabil.";
        }
    }
</script>

</body>
</html>
