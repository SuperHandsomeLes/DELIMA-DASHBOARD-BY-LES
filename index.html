<script>
    const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQIDL_97U8seCG9Ibuz-tfkjpouZe3V_q2Uh-NbvdhEIctFj35L6-LN55TuRw_3IQ/pub?output=csv";
    let dataFull = [];

    async function init() {
        try {
            const res = await fetch(csvURL);
            const text = await res.text();
            
            // Kod baru untuk handle komma dalam nama
            const rows = text.split('\n').filter(r => r.trim() !== '');
            dataFull = rows.map(r => {
                // Guna regex untuk asingkan CSV dengan betul
                return r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
            });
            
            console.log("Data Berjaya Dimuatkan");
        } catch (e) {
            console.error("Gagal muat data");
        }
    }

    function cariData() {
        const input = document.getElementById('nameInput').value.trim().toUpperCase();
        const resDiv = document.getElementById('result');
        resDiv.innerHTML = '';

        if (input.length < 3) {
            resDiv.innerHTML = '<p class="status-msg">Sila taip sekurang-kurangnya 3 huruf.</p>';
            return;
        }

        // Cari dalam semua lajur untuk lebih selamat
        const match = dataFull.filter(row => {
            return row.some(cell => cell && cell.toUpperCase().includes(input));
        });

        if (match.length > 0) {
            match.forEach(row => {
                // Cari mana satu yang ada @moe-dl untuk dijadikan ID
                const idDelima = row.find(c => c.includes('@')) || 'TIADA ID';
                const namaMurid = row[0].replace(/"/g, ''); // Buang tanda pembuka kata jika ada
                const kelasMurid = row[1] || '-';

                resDiv.innerHTML += `
                    <div class="card">
                        <span class="name">${namaMurid}</span>
                        <span class="class-name">KELAS: ${kelasMurid}</span>
                        <div class="id-container">
                            <span class="id-text">${idDelima}</span>
                            <button class="copy-btn" onclick="salin('${idDelima}')">SALIN</button>
                        </div>
                    </div>
                `;
            });
        } else {
            resDiv.innerHTML = '<p class="status-msg">Nama tidak dijumpai dalam rekod.</p>';
        }
    }

    function salin(teks) {
        if(teks === 'TIADA ID') return;
        navigator.clipboard.writeText(teks).then(() => {
            alert("ID DELIMa disalin!");
        });
    }

    window.onload = init;
</script>
