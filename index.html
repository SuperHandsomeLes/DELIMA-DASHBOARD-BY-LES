<script>
    const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQIDL_97U8seCG9Ibuz-tfkjpouZe3V_q2Uh-NbvdhEIctFj35L6-LN55TuRw_3IQ/pub?output=csv";
    let dataFull = [];

    async function init() {
        try {
            const res = await fetch(csvURL);
            const text = await res.text();
            
            // Kod baru: Membersihkan data dan handle komma
            const rows = text.split('\n').filter(r => r.trim() !== '');
            dataFull = rows.map(r => {
                // Regex kuat untuk asingkan CSV walaupun ada komma dalam quotes
                return r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
            });
            
            console.log("Data Berjaya Dimuatkan");
        } catch (e) {
            console.error("Gagal muat data");
            document.getElementById('result').innerHTML = "<p class='status-msg'>Ralat: Internet tidak stabil.</p>";
        }
    }

    function cariData() {
        const input = document.getElementById('nameInput').value.trim().toUpperCase();
        const resDiv = document.getElementById('result');
        resDiv.innerHTML = '';

        if (input.length < 3) {
            resDiv.innerHTML = '<p class="status-msg">Sila taip sekurang-kurangnya 3 huruf.</p>';
            return;
        }

        // Carian pintar: Scan semua kotak (cells) dalam satu baris
        const match = dataFull.filter(row => {
            return row.some(cell => cell && cell.toUpperCase().includes(input));
        });

        if (match.length > 0) {
            match.forEach(row => {
                // Detect ID secara automatik: Scan kotak mana yang ada simbol @
                const idDelima = row.find(c => c && c.includes('@')) || 'TIADA ID';
                
                // Pastikan kita ambil Nama dari Lajur B (row[1]) & Kelas dari Lajur D (row[3])
                // Kita guna replace untuk buang tanda " jika data CSV tersalah format
                const namaMurid = row[1] ? row[1].replace(/"/g, '') : 'TIADA NAMA';
                const kelasMurid = row[3] ? row[3].replace(/"/g, '') : '-';

                resDiv.innerHTML += `
                    <div class="card">
                        <span class="name">${namaMurid}</span>
                        <span class="class-name">KELAS: ${kelasMurid}</span>
                        <div class="id-container">
                            <span class="id-text">${idDelima}</span>
                            <button class="copy-btn" onclick="salin('${idDelima}')">SALIN</button>
                        </div>
                    </div>
                `;
            });
        } else {
            resDiv.innerHTML = '<p class="status-msg">Nama tidak dijumpai dalam rekod.</p>';
        }
    }

    function salin(teks) {
        if(teks === 'TIADA ID') return;
        navigator.clipboard.writeText(teks).then(() => {
            alert("ID DELIMa disalin!");
        }).catch(() => {
            // Fallback untuk browser tertentu
            const textArea = document.createElement("textarea");
            textArea.value = teks;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            alert("ID DELIMa disalin!");
        });
    }

    window.onload = init;
</script>
